name: Daily Job Sync

on:
  schedule:
    # 03:00 UTC = 06:00 EEST (UTC+3, summer). In winter (EET, UTC+2) this fires at 05:00 local.
    - cron: '0 3 * * *'
  workflow_dispatch: # allow manual runs from the GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily sync
        env:
          WP_SITE_URL: https://revopscareers.com
          WP_USERNAME: webadmin
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HIREBASE_API_KEY: ${{ secrets.HIREBASE_API_KEY }}
          LENSA_SDK_KEY: ${{ secrets.LENSA_SDK_KEY }}
          LENSA_CAMPAIGN_ID: ${{ secrets.LENSA_CAMPAIGN_ID }}
        run: bash daily_sync.sh

      - name: Commit updated dedup cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imported_jobs.json imported_whatjobs.json imported_whatjobs_sg.json || true
          git diff --cached --quiet || git commit -m "chore: update imported_jobs cache [skip ci]"
          git push || true
